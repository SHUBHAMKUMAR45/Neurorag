global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    system: neurorag
    environment: production

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: [alertmanager:9093]

scrape_configs:
  - job_name: neurorag-api
    static_configs:
      - targets: [neurorag-api:9090]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: postgres
    static_configs:
      - targets: [postgres-exporter:9187]

  - job_name: redis
    static_configs:
      - targets: [redis-exporter:9121]

  - job_name: node
    static_configs:
      - targets: [node-exporter:9100]

  - job_name: pushgateway
    honor_labels: true
    static_configs:
      - targets: [pushgateway:9091]
