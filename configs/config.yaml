# ─── NeuroRAG Config — Windows / CPU / OpenAI mode ───────────────────────────
system:
  name: "NeuroRAG"
  version: "3.0.0"
  environment: "development"
  log_level: "INFO"

llm:
  provider: "gemini"
  model: "gemini-2.5-flash"
  temperature: 0.1
  max_tokens: 2048
  top_p: 0.9
  repeat_penalty: 1.1
  device: "cpu"

critic_llm:
  provider: "gemini"
  model: "gemini-2.5-flash"
  temperature: 0.0
  max_tokens: 512

embedding:
  model: "sentence-transformers/all-MiniLM-L6-v2"
  batch_size: 32
  device: "cpu"
  normalize: true
  dimension: 384

retrieval:
  top_k: 15
  hybrid: true
  bm25_weight: 0.40
  vector_weight: 0.60
  chunk_size: 600
  chunk_overlap: 100
  max_context_tokens: 6000

reranker:
  model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  top_k: 8
  device: "cpu"

self_heal:
  max_loops: 3
  confidence_threshold: 0.80
  failure_cooldown_ms: 100

vector_store:
  backend: "faiss"
  index_path: "./data/faiss/index.bin"
  ids_path: "./data/faiss/ids.json"
  metric: "inner_product"

bm25:
  index_path: "./data/whoosh_index"

database:
  postgres_url: "${POSTGRES_URL}"
  pool_size: 5
  max_overflow: 10

cache:
  redis_url: "${REDIS_URL}"
  ttl_seconds: 3600
  max_size_mb: 256

monitoring:
  prometheus_port: 9090
  metrics_path: "/metrics"
  enable_tracing: false
  jaeger_host: "localhost"
  jaeger_port: 6831

api:
  host: "0.0.0.0"
  port: 8000
  workers: 1
  timeout: 120
  cors_origins: ["*"]
  rate_limit_per_minute: 120

security:
  pii_filtering: true
  max_query_length: 2000
  api_key_required: true
  api_key_env_var: "NEURORAG_API_KEY"
